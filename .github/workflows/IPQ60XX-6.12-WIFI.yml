name: IPQ60XX-6.12-WIFI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  CF_PAGE_PROJECT_ID: openwrt-release
  CONFIG_FILE: configs/ipq60xx-6.12-wifi.config
  REPO_URL: https://github.com/Chihsiao/openwrt-6.x.git
  REPO_BRANCH: main-nss

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Print server info
        run: |
          grep 'model name' /proc/cpuinfo | cut -f2 -d: | uniq -c
          free -h
          df -hT

      - name: Remove snap completely
        uses: ading2210/gh-actions-remove-snap@v1.0.0

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone
        run: |
          git clone --depth 1 -b "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Configure
        run: |
          cd openwrt
          cp "../$CONFIG_FILE" .config
          [ ! -d ../files ] || mv ../files files
          if [ -n "${CUSTOMIZE_SCRIPT:-}" ]; then
            chmod +x "../$CUSTOMIZE_SCRIPT"
            "../$CUSTOMIZE_SCRIPT"
          fi
          ./scripts/feeds update -a && \
            ./scripts/feeds install -a
          make defconfig

          echo "SOURCE_REPO=$(basename "$REPO_URL" .git)" >> "$GITHUB_ENV"
          echo "DEVICE_TARGET=$(grep CONFIG_TARGET_BOARD .config | awk -F '"' '{print $2}')" >> "$GITHUB_ENV"
          echo "DEVICE_SUBTARGET=$(grep CONFIG_TARGET_SUBTARGET .config | awk -F '"' '{print $2}')" >> "$GITHUB_ENV"

      - name: Download deps
        run: |
          cd openwrt
          make download -j"$(nproc)"

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          echo "$(nproc) thread compile"
          make -j"$(nproc)" || make -j1 || make -j1 V=s
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Print space usage
        if: (!cancelled())
        run: df -hT

      - name: Upload bin as artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@main
        with:
          path: openwrt/bin
          name: ${{ env.SOURCE_REPO }}-bin-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}

      - name: Deploy bin to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy openwrt/bin --project-name=${{ env.CF_PAGE_PROJECT_ID }}
